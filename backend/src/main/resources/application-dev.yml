spring:
  datasource:
    zastra: # <-- Main Zastra DB (users, roles, reports, etc.)
      url: jdbc:postgresql://localhost:5432/zastra_db
      username: zastra_user
      password: change_me
      driver-class-name: org.postgresql.Driver

    media: # <-- Secondary Media DB (media files, storage)
      url: jdbc:postgresql://localhost:5432/media_db
      username: media_user
      password: media_secret
      driver-class-name: org.postgresql.Driver

  jpa:
    # Make Hibernate NOT manage schema on startup (we will initialize with your SQL files)
    hibernate:
      ddl-auto: none

    # Per-datasource overrides (used by your DataSource configs when reading env)
    zastra:
      hibernate:
        ddl-auto: none

    media:
      hibernate:
        ddl-auto: none

    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time-zone: UTC

  mail:
    host: smtp.mailtrap.io
    port: 2525
    username: your_mailtrap_username   # Replace with your Mailtrap username
    password: your_mailtrap_password   # Replace with your Mailtrap password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            trust: smtp.mailtrap.io
      debug: true                     # enable detailed mail debug logs (temporary)

  # Facebook OAuth Configuration
  facebook:
    client:
      id: 1544540776565570
      secret: 0b18c9a1f700282bcb28ab09a903707a

  # Google OAuth Configuration
  google:
    client:
      id: 949357721253-e7s1uche78786p3iamor1kaoaru1cihr.apps.googleusercontent.com
      secret: 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

  # Frontend URL for OAuth redirects
  app:
    frontend-url: http://localhost:5173

